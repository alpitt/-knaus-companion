name: Migrate Knaus Companion source into repository

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/migrate-source-once.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract current application into app directory
        shell: bash
        run: |
          set -euo pipefail

          ZIP="$(find . -maxdepth 1 -type f -name 'Knaus_Companion*.zip' -printf '%f\n' | sort -V | tail -n 1)"
          test -n "$ZIP"
          echo "Migrating source from $ZIP"

          rm -rf app _migration_extract
          mkdir -p app _migration_extract
          unzip -q "$ZIP" -d _migration_extract

          APP_DIR="$(find _migration_extract -type f -name index.html -printf '%h\n' | grep -v '/__MACOSX/' | head -n 1)"
          test -n "$APP_DIR"
          cp -a "$APP_DIR"/. app/
          touch app/.nojekyll

          test -f app/index.html
          test "$(find app/chapters -type f -name '*.json' | wc -l)" -eq 44
          test "$(find app/manual/pages -type f | wc -l)" -eq 286
          test -f app/docs/Knaus_Sun_Traveller_Manufacturer_Manual.pdf

          rm -rf _migration_extract
          rm -f Knaus_Companion*.zip
          rm -f .github/workflows/migrate-source-once.yml

      - name: Commit repository source migration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Store Knaus Companion v4.3.0 source directly in repository"
          git push origin main
