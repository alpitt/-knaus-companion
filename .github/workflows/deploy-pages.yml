name: Deploy Knaus Companion to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: knaus-companion-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Validate repository application source
        shell: bash
        run: |
          set -euo pipefail
          test -f app/index.html
          test "$(find app/chapters -type f -name '*.json' | wc -l)" -eq 44
          test "$(find app/manual/pages -type f | wc -l)" -eq 286
          test -f app/docs/Knaus_Sun_Traveller_Manufacturer_Manual.pdf
          echo "Validated $(find app -type f | wc -l) application files."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
