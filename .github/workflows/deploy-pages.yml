name: Deploy Knaus Companion to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "Knaus_Companion_Ultimate_v*.zip"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static site from newest release package
        shell: bash
        run: |
          set -euo pipefail

          ZIP="$(find . -maxdepth 1 -type f -name 'Knaus_Companion_Ultimate_v*.zip' -printf '%f\n' | sort -V | tail -n 1)"
          test -n "$ZIP"
          echo "Deploying $ZIP"

          rm -rf _site unpacked
          mkdir -p _site unpacked
          unzip -q "$ZIP" -d unpacked

          APP_DIR="$(find unpacked -type f -name index.html -printf '%h\n' | head -n 1)"
          test -n "$APP_DIR"
          cp -R "$APP_DIR"/. _site/
          touch _site/.nojekyll

          test -f _site/index.html
          test "$(find _site/chapters -type f -name '*.json' | wc -l)" -eq 44
          test "$(find _site/manual/pages -type f | wc -l)" -eq 286
          test -f _site/docs/Knaus_Sun_Traveller_Manufacturer_Manual.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
