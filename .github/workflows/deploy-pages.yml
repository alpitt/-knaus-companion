name: Deploy Knaus Companion to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: knaus-companion-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Validate repository application source
        shell: bash
        run: |
          set -euo pipefail
          test -f app/index.html
          node --check app/assets/js/app-v4.js
          test "$(find app/chapters -type f -name '*.json' | wc -l)" -eq 44
          test "$(find app/manual/pages -type f | wc -l)" -eq 286
          test -f app/docs/Knaus_Sun_Traveller_Manufacturer_Manual.pdf
          echo "Validated $(find app -type f | wc -l) application files."

      - name: Validate interactive system data
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = Path("app/data")
          for path in data.glob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))

          components = json.loads((data / "electrical_components.json").read_text(encoding="utf-8"))
          relations = json.loads((data / "electrical_relations.json").read_text(encoding="utf-8"))
          component_ids = {component["id"] for component in components}
          assert len(component_ids) == len(components), "Electrical component IDs must be unique"
          for relation in relations:
              assert relation["from"] in component_ids, f"Unknown relation source: {relation['from']}"
              assert relation["to"] in component_ids, f"Unknown relation target: {relation['to']}"
          print(f"Validated {len(components)} electrical components and {len(relations)} relations.")

          water_components = json.loads((data / "water_components.json").read_text(encoding="utf-8"))
          water_relations = json.loads((data / "water_relations.json").read_text(encoding="utf-8"))
          water_ids = {component["id"] for component in water_components}
          assert len(water_ids) == len(water_components), "Water component IDs must be unique"
          for relation in water_relations:
              assert relation["from"] in water_ids, f"Unknown water relation source: {relation['from']}"
              assert relation["to"] in water_ids, f"Unknown water relation target: {relation['to']}"
          print(f"Validated {len(water_components)} water components and {len(water_relations)} relations.")

          gas_components = json.loads((data / "gas_components.json").read_text(encoding="utf-8"))
          gas_relations = json.loads((data / "gas_relations.json").read_text(encoding="utf-8"))
          gas_ids = {component["id"] for component in gas_components}
          assert len(gas_ids) == len(gas_components), "Gas component IDs must be unique"
          for relation in gas_relations:
              assert relation["from"] in gas_ids, f"Unknown gas relation source: {relation['from']}"
              assert relation["to"] in gas_ids, f"Unknown gas relation target: {relation['to']}"
          print(f"Validated {len(gas_components)} gas components and {len(gas_relations)} relations.")

          hotspots = json.loads((data / "vehicle_explorer.json").read_text(encoding="utf-8"))
          hotspot_ids = {hotspot["id"] for hotspot in hotspots}
          assert len(hotspot_ids) == len(hotspots), "Vehicle hotspot IDs must be unique"
          systems = {"electrical": component_ids, "water": water_ids, "gas": gas_ids}
          for hotspot in hotspots:
              assert hotspot["view"] in {"interior", "exterior", "roof"}, f"Unknown vehicle view: {hotspot['view']}"
              for key in ("x", "y", "w", "h"):
                  assert 0 <= hotspot[key] <= 100, f"Invalid {key} for hotspot {hotspot['id']}"
              if hotspot.get("component") and hotspot["system"] in systems:
                  assert hotspot["component"] in systems[hotspot["system"]], f"Unknown component for hotspot {hotspot['id']}"
          print(f"Validated {len(hotspots)} interactive vehicle hotspots.")

          fuses = json.loads((data / "fuses.json").read_text(encoding="utf-8"))
          fuse_keys = {(fuse["box"], fuse["label"]) for fuse in fuses}
          assert len(fuse_keys) == len(fuses), "Fuse board and label pairs must be unique"
          for fuse in fuses:
              assert fuse["box"] and fuse["label"] and fuse["rating"] and fuse["function"], "Fuse records require board, label, rating and function"
              assert fuse["component"] in component_ids, f"Unknown electrical component for fuse {fuse['label']}"
          print(f"Validated {len(fuses)} documented fuses across {len({fuse['box'] for fuse in fuses})} boards.")

          touring = json.loads((data / "touring_operations.json").read_text(encoding="utf-8"))
          assert touring["version"] == "4.5.0", "Touring operations data must match release 4.5.0"
          lists = touring["lists"]
          list_ids = [stage["id"] for stage in lists]
          assert list_ids == ["departure", "arrival", "leaving-site", "return"], "Touring stages are missing or out of order"
          for stage in lists:
              item_ids = [item["id"] for item in stage["items"]]
              assert len(item_ids) == len(set(item_ids)), f"Duplicate item IDs in touring stage {stage['id']}"
              assert all(item["text"].strip() for item in stage["items"]), f"Empty checklist item in touring stage {stage['id']}"
              assert all(1 <= page <= 286 for page in stage.get("manualPages", [])), f"Invalid manual page in touring stage {stage['id']}"
          print(f"Validated {len(lists)} touring stages and {sum(len(stage['items']) for stage in lists)} checklist items.")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

