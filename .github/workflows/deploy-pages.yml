name: Validate and Deploy Knaus Companion

on:
  push:
    branches:
      - main
      - release/v2.0.0-foundation
      - release/v2.0.1-ux
      - release/v2.1.0-electrical
    paths:
      - "Knaus_Companion_Ultimate_v1.0.zip"
      - "Knaus_Companion_Ultimate_v2.0.0.zip"
      - "Knaus_Companion_Ultimate_v2.0.1.zip"
      - "Knaus_Companion_Ultimate_v2.1.0.zip"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select application package
        shell: bash
        run: |
          set -euo pipefail
          if [ -f Knaus_Companion_Ultimate_v2.1.0.zip ]; then
            echo "APP_ZIP=Knaus_Companion_Ultimate_v2.1.0.zip" >> "$GITHUB_ENV"
            echo "APP_DIR_NAME=Knaus_Companion_Ultimate_v2.1.0" >> "$GITHUB_ENV"
            echo "EXPECTED_VERSION=2.1.0" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=knaus-companion-v2.1.0-electrical" >> "$GITHUB_ENV"
          elif [ -f Knaus_Companion_Ultimate_v2.0.1.zip ]; then
            echo "APP_ZIP=Knaus_Companion_Ultimate_v2.0.1.zip" >> "$GITHUB_ENV"
            echo "APP_DIR_NAME=Knaus_Companion_Ultimate_v2.0.1" >> "$GITHUB_ENV"
            echo "EXPECTED_VERSION=2.0.1" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=knaus-companion-v2.0.1-ux" >> "$GITHUB_ENV"
          elif [ -f Knaus_Companion_Ultimate_v2.0.0.zip ]; then
            echo "APP_ZIP=Knaus_Companion_Ultimate_v2.0.0.zip" >> "$GITHUB_ENV"
            echo "APP_DIR_NAME=Knaus_Companion_Ultimate_v2.0.0" >> "$GITHUB_ENV"
            echo "EXPECTED_VERSION=2.0.0" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=knaus-companion-v2.0.0-foundation" >> "$GITHUB_ENV"
          else
            echo "APP_ZIP=Knaus_Companion_Ultimate_v1.0.zip" >> "$GITHUB_ENV"
            echo "APP_DIR_NAME=Knaus_Companion_Ultimate" >> "$GITHUB_ENV"
            echo "EXPECTED_VERSION=1.0" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=knaus-companion-v1.0" >> "$GITHUB_ENV"
          fi

      - name: Build and validate static site
        shell: bash
        run: |
          set -euo pipefail
          test -f "$APP_ZIP"
          rm -rf _site unpacked
          mkdir -p _site unpacked
          unzip -q "$APP_ZIP" -d unpacked
          APP_DIR="unpacked/$APP_DIR_NAME"
          test -f "$APP_DIR/index.html"
          cp -R "$APP_DIR"/. _site/
          touch _site/.nojekyll

          test "$(find _site/chapters -type f -name '*.json' | wc -l)" -eq 44
          test "$(find _site/manual/pages -type f | wc -l)" -eq 286
          test "$(find _site/assets/photos -type f | wc -l)" -ge 6
          test -f _site/docs/Knaus_Sun_Traveller_Manufacturer_Manual.pdf
          test -f _site/data/build.json
          test -f _site/data/integrity.json
          test -f _site/assets/js/app.js
          test -f _site/assets/css/app.css
          test -f _site/manifest.webmanifest
          test -f _site/service-worker.js

          python3 - <<'PY'
          import json, os, re
          from pathlib import Path
          site=Path('_site')
          expected=os.environ['EXPECTED_VERSION']
          build=json.loads((site/'data/build.json').read_text())
          chapters=json.loads((site/'data/chapters.json').read_text())
          page_files=json.loads((site/'data/manual_page_files.json').read_text())
          assert build['version']==expected,(build['version'],expected)
          assert build['counts']['chapters']>=44
          assert build['counts']['manualPages']>=286
          assert build['counts']['photos']>=6
          assert build['counts']['documents']>=1
          assert len(chapters)==44
          assert [c['n'] for c in chapters]==list(range(1,45))
          assert len(page_files)==286
          for chapter in chapters:
              path=site/'chapters'/f"{chapter['n']:02d}.json"
              assert path.is_file(),path
              data=json.loads(path.read_text())
              assert data['n']==chapter['n']
              assert data.get('title') and data.get('content')
              assert 1<=int(data.get('officialPage',1))<=286
          for page_file in page_files:
              assert (site/'manual/pages'/page_file).is_file(),page_file
          html=(site/'index.html').read_text()
          js=(site/'assets/js/app.js').read_text()
          assert 'Knaus Companion Ultimate' in html
          assert f'APP_VERSION="{expected}"' in js
          assert 'bookmarkChapter' in html and 'bookmarkManualPage' in html
          assert 'releaseCards' in html and 'integrityResults' in html
          if expected in ('2.0.1','2.1.0'):
              assert 'bottom-nav' in html and 'quickFab' in html and 'safetyLockResults' in html
          if expected=='2.1.0':
              for name in ('electrical_components.json','fuses.json','electrical_diagnostics.json'):
                  assert (site/'data'/name).is_file(),name
              components=json.loads((site/'data/electrical_components.json').read_text())
              fuses=json.loads((site/'data/fuses.json').read_text())
              diagnostics=json.loads((site/'data/electrical_diagnostics.json').read_text())
              assert len(components)>=7
              assert len(fuses)>=11
              assert len(diagnostics)>=3
              assert 'electricalCards' in html and 'fuseBody' in html
              assert 'renderElectrical' in js and 'renderFuses' in js
          refs=[]
          for text in (html,js): refs+=re.findall(r'(?:src|href)=["\']([^"\']+)["\']',text)
          for ref in refs:
              if ref.startswith(('http:','https:','#','data:','mailto:')) or '${' in ref or '{' in ref or '}' in ref: continue
              clean=ref.split('#')[0].split('?')[0]
              if clean and not clean.endswith('/'): assert (site/clean).exists(),clean
          print('PASS:',expected)
          print('PASS: preservation baseline')
          if expected=='2.1.0': print('PASS: electrical workshop data and controls')
          PY

      - name: Upload validated staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: _site
          if-no-files-found: error
          retention-days: 14

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Rebuild validated site for deployment
        shell: bash
        run: |
          set -euo pipefail
          if [ -f Knaus_Companion_Ultimate_v2.1.0.zip ]; then APP_ZIP=Knaus_Companion_Ultimate_v2.1.0.zip; APP_DIR_NAME=Knaus_Companion_Ultimate_v2.1.0
          elif [ -f Knaus_Companion_Ultimate_v2.0.1.zip ]; then APP_ZIP=Knaus_Companion_Ultimate_v2.0.1.zip; APP_DIR_NAME=Knaus_Companion_Ultimate_v2.0.1
          elif [ -f Knaus_Companion_Ultimate_v2.0.0.zip ]; then APP_ZIP=Knaus_Companion_Ultimate_v2.0.0.zip; APP_DIR_NAME=Knaus_Companion_Ultimate_v2.0.0
          else APP_ZIP=Knaus_Companion_Ultimate_v1.0.zip; APP_DIR_NAME=Knaus_Companion_Ultimate; fi
          rm -rf _site unpacked
          mkdir -p _site unpacked
          unzip -q "$APP_ZIP" -d unpacked
          cp -R "unpacked/$APP_DIR_NAME"/. _site/
          touch _site/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
