name: Deploy current Knaus Companion to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out approved stable release
        uses: actions/checkout@v4
        with:
          ref: release/v3.0.0-ai-assistant
          fetch-depth: 1

      - name: Prepare site files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site _extract
          mkdir -p _site _extract

          ZIP_FILE="$(find . -type f -iname '*v3.0.0*.zip' -print -quit || true)"

          if [ -n "$ZIP_FILE" ]; then
            echo "Using release archive: $ZIP_FILE"
            unzip -q "$ZIP_FILE" -d _extract
            INDEX_FILE="$(find _extract -type f -name index.html -print -quit || true)"
            if [ -z "$INDEX_FILE" ]; then
              echo "No index.html found inside $ZIP_FILE"
              exit 1
            fi
            SITE_ROOT="$(dirname "$INDEX_FILE")"
            cp -a "$SITE_ROOT"/. _site/
          elif [ -f index.html ]; then
            echo "Using extracted site files from branch root"
            find . -mindepth 1 -maxdepth 1 \
              ! -name '.git' \
              ! -name '.github' \
              ! -name '_site' \
              ! -name '_extract' \
              -exec cp -a {} _site/ \;
          else
            INDEX_FILE="$(find . -type f -name index.html -not -path './.git/*' -print -quit || true)"
            if [ -z "$INDEX_FILE" ]; then
              echo "No deployable index.html or v3.0.0 ZIP was found on the release branch"
              exit 1
            fi
            SITE_ROOT="$(dirname "$INDEX_FILE")"
            cp -a "$SITE_ROOT"/. _site/
          fi

          # Fix the Vehicle Explorer temporal-dead-zone error in the packaged v3.0.0 app.
          python3 - <<'PY'
          from pathlib import Path
          p = Path('_site/assets/js/app.js')
          text = p.read_text(encoding='utf-8')
          declaration = 'let explorerView="interior",wakeLock=null;'
          if declaration in text:
              text = text.replace(declaration, '', 1)
              anchor = 'let state='
              pos = text.find(anchor)
              if pos == -1:
                  raise SystemExit('Could not locate state declaration in app.js')
              text = text[:pos] + declaration + '\n' + text[pos:]
              p.write_text(text, encoding='utf-8')
          if declaration not in text:
              raise SystemExit('Explorer declaration was not found')
          if text.find(declaration) > text.find('init().catch'):
              raise SystemExit('Explorer initialization hotfix did not apply')
          PY

          # Force one clean reload on devices that cached the broken build.
          python3 - <<'PY'
          from pathlib import Path
          p = Path('_site/index.html')
          text = p.read_text(encoding='utf-8')
          marker = 'knaus-cache-reset-stable-v300-hotfix2'
          cleanup = f'''<script>
          (function(){{
            var marker='{marker}';
            if(localStorage.getItem(marker)==='done') return;
            Promise.all([
              ('serviceWorker' in navigator) ? navigator.serviceWorker.getRegistrations().then(function(rs){{return Promise.all(rs.map(function(r){{return r.unregister();}}));}}) : Promise.resolve(),
              ('caches' in window) ? caches.keys().then(function(keys){{return Promise.all(keys.map(function(k){{return caches.delete(k);}}));}}) : Promise.resolve()
            ]).then(function(){{
              localStorage.setItem(marker,'done');
              var u=new URL(location.href);u.searchParams.set('appVersion','3.0.0-stable-hotfix2');location.replace(u.toString());
            }}).catch(function(){{localStorage.setItem(marker,'done');}});
          }})();
          </script>'''
          if marker not in text:
              text = text.replace('</head>', cleanup + '\n</head>')
              p.write_text(text, encoding='utf-8')
          PY

          touch _site/.nojekyll
          test -f _site/index.html
          grep -q '3.0.0' _site/index.html
          echo "Prepared $(find _site -type f | wc -l) files for deployment"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
